fragment ProfileDetail on Profile {
  id
  firstName
  lastName
  name
  username
  headline
  title
  urn
  country
  city
  educations
  positions
  skills
  geoData
  rawDataS3Key
  cleanedDataS3Key
  profileEntry {
    ...ProfileEntry
  }

  sourceFile
  createdAt
  updatedAt
}

fragment Profile on Profile {
  id
  name
  title
  urn
}

fragment ProfileTitleGroup on ProfileTitleGroup {
  title
  count
}
